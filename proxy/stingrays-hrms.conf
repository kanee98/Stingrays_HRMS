# Nginx reverse proxy for Stingrays HRMS (subdomain setup).
# Domain: stingraysglobal.com — main app at https://hrms.stingraysglobal.com
# Copy to: /etc/nginx/sites-available/stingrays-hrms
# Enable: sudo ln -s /etc/nginx/sites-available/stingrays-hrms /etc/nginx/sites-enabled/
# SSL: certbot will add listen 443 ssl and certificate paths when you run certbot --nginx.

# HRMS main UI — https://hrms.stingraysglobal.com
server {
    listen 80;
    server_name hrms.stingraysglobal.com;
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

