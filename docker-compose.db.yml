services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file:
      - path: .env
        required: false
    environment:
      ACCEPT_EULA: Y
      MSSQL_PID: ${MSSQL_PID:-Developer}
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-Kanishka#9810}
    ports:
      - "127.0.0.1:${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '</dev/tcp/127.0.0.1/1433' >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - stingrays

  db-init:
    build:
      context: .
      dockerfile: docker/db-init/Dockerfile
    env_file:
      - path: .env
        required: false
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      DB_HOST: mssql
      DB_PORT: 1433
      DB_NAME: ${DB_NAME:-StingraysHRMS}
      DB_USER: sa
      DB_PASSWORD: ${DB_PASSWORD:-Kanishka#9810}
      AUTH_SEED_EMAIL: ${AUTH_SEED_EMAIL:-admin@stingrays.com}
      AUTH_SEED_PASSWORD: ${AUTH_SEED_PASSWORD:-Admin@123}
      AUTH_SEED_NAME: ${AUTH_SEED_NAME:-Platform Administrator}
      SUPER_ADMIN_SEED_EMAIL: ${SUPER_ADMIN_SEED_EMAIL:-superadmin@fusionlabz.lk}
      SUPER_ADMIN_SEED_PASSWORD: ${SUPER_ADMIN_SEED_PASSWORD:-SuperAdmin@123}
      SUPER_ADMIN_SEED_NAME: ${SUPER_ADMIN_SEED_NAME:-FusionLabz Platform Super Admin}
    restart: "no"
    networks:
      - stingrays

volumes:
  mssql_data:
    name: stingrays_hrms_mssql_data

networks:
  stingrays:
    name: stingrays_hrms_network
