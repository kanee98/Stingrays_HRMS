        NEXT_PUBLIC_SUPER_ADMIN_API_URL: "${NEXT_PUBLIC_SUPER_ADMIN_API_URL:-http://${PUBLIC_HOST:-localhost}:4020}"
        NEXT_PUBLIC_DEFAULT_CLIENT_KEY: "${NEXT_PUBLIC_DEFAULT_CLIENT_KEY:-stingrays}"
