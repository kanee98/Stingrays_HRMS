# App stack only. Database runs from docker-compose.db.yml so it is not rebuilt.
# First time or when DB is needed: docker compose -f docker-compose.db.yml up -d
# Then: docker compose build && docker compose up

services:
  hrms-ui:
    build:
      context: .
      dockerfile: hrms-ui/Dockerfile
      args:
        NEXT_PUBLIC_AUTH_SERVICE_URL: "http://localhost:4001"
        NEXT_PUBLIC_EMPLOYEE_UI_URL: "http://localhost:3001"
        NEXT_PUBLIC_EMPLOYEE_API_URL: "http://localhost:4000"
        NEXT_PUBLIC_PAYROLL_URL: "http://localhost:3010"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AUTH_SERVICE_URL: "http://localhost:4001"
      NEXT_PUBLIC_EMPLOYEE_UI_URL: "http://localhost:3001"
      NEXT_PUBLIC_EMPLOYEE_API_URL: "http://localhost:4000"
      NEXT_PUBLIC_PAYROLL_URL: "http://localhost:3010"

  payroll-ui:
    build:
      context: .
      dockerfile: payroll/frontend/Dockerfile
      args:
        NEXT_PUBLIC_PAYROLL_API_URL: "http://localhost:4010"
        NEXT_PUBLIC_HRMS_URL: "http://localhost:3000"
        NEXT_PUBLIC_EMPLOYEE_UI_URL: "http://localhost:3001"
        NEXT_PUBLIC_PAYROLL_URL: "http://localhost:3010"
    ports:
      - "3010:3010"
    environment:
      NEXT_PUBLIC_PAYROLL_API_URL: "http://localhost:4010"
      NEXT_PUBLIC_HRMS_URL: "http://localhost:3000"
      NEXT_PUBLIC_EMPLOYEE_UI_URL: "http://localhost:3001"
      NEXT_PUBLIC_PAYROLL_URL: "http://localhost:3010"

  payroll-api:
    build: ./payroll/backend
    ports:
      - "4010:4010"
    environment:
      DB_HOST: mssql
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: "Kanishka#9810"
      DB_NAME: StingraysHRMS
      PORT: 4010
    networks:
      - default
      - hrms-db

  employee-ui:
    build:
      context: .
      dockerfile: employee-onboarding/frontend/Dockerfile
      args:
        NEXT_PUBLIC_HRMS_URL: "http://localhost:3000"
        NEXT_PUBLIC_EMPLOYEE_UI_URL: "http://localhost:3001"
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_HRMS_URL: "http://localhost:3000"
      NEXT_PUBLIC_EMPLOYEE_UI_URL: "http://localhost:3001"

  employee-api:
    build: ./employee-onboarding/backend
    ports:
      - "4000:4000"
    environment:
      DB_HOST: mssql
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: "Kanishka#9810"
      DB_NAME: StingraysHRMS
    networks:
      - default
      - hrms-db

  auth-service:
    build: ./auth-service
    ports:
      - "4001:4000"
    environment:
      # Use container name so DB is reachable when using docker-compose.db.yml
      DB_HOST: stingrays-mssql
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: "Kanishka#9810"
      DB_NAME: StingraysHRMS
      JWT_SECRET: "your-secret-key-change-this-in-production"
      PORT: 4000
    networks:
      - default
      - hrms-db
    restart: unless-stopped

networks:
  hrms-db:
    name: stingrays-hrms-db
    external: true  