services:
  hrms-ui:
    build: ./hrms-ui
    ports:
      - "3000:3000"

  employee-ui:
    build: ./employee-onboarding/frontend
    ports:
      - "3001:3000"

  employee-api:
    build: ./employee-onboarding/backend
    ports:
      - "4000:4000"

  auth-service:
    build: ./auth-service
    ports:
      - "4001:4000"
    env_file:
      - ./auth-service/.env