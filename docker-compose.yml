      - "3000:3000"
    environment:
      NEXT_PUBLIC_AUTH_SERVICE_URL: "${NEXT_PUBLIC_AUTH_SERVICE_URL:-http://${PUBLIC_HOST:-localhost}:4001}"
      NEXT_PUBLIC_PORTAL_URL: "${NEXT_PUBLIC_PORTAL_URL:-http://${PUBLIC_HOST:-localhost}:3000}"
