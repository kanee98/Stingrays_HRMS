services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 4000
      BACKEND_PORT: 4000
      DB_HOST: ${DB_HOST:-mssql}
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME:-StingraysHRMS}
      DB_USER: ${DB_USER:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-Kanishka#9810}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      PASETO_SECRET: ${PASETO_SECRET:-replace-me}
      SUPER_ADMIN_PASETO_SECRET: ${SUPER_ADMIN_PASETO_SECRET:-replace-me}
      AUTH_SEED_EMAIL: ${AUTH_SEED_EMAIL:-admin@stingrays.com}
      AUTH_SEED_PASSWORD: ${AUTH_SEED_PASSWORD:-Admin@123}
      AUTH_SEED_NAME: ${AUTH_SEED_NAME:-Platform Administrator}
      SUPER_ADMIN_SEED_EMAIL: ${SUPER_ADMIN_SEED_EMAIL:-superadmin@fusionlabz.lk}
      SUPER_ADMIN_SEED_PASSWORD: ${SUPER_ADMIN_SEED_PASSWORD:-SuperAdmin@123}
      SUPER_ADMIN_SEED_NAME: ${SUPER_ADMIN_SEED_NAME:-FusionLabz Platform Super Admin}
      SUPER_ADMIN_DEFAULT_CLIENT_KEY: ${SUPER_ADMIN_DEFAULT_CLIENT_KEY:-stingrays}
      SUPER_ADMIN_DEFAULT_CLIENT_NAME: ${SUPER_ADMIN_DEFAULT_CLIENT_NAME:-Stingrays}
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${APP_BACKEND_PORT:-4000}:4000"
    volumes:
      - onboarding_uploads:/app/backend/dist/modules/onboarding/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - stingrays

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_INTERNAL_URL: http://backend:4000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_DEFAULT_CLIENT_KEY: ${NEXT_PUBLIC_DEFAULT_CLIENT_KEY:-stingrays}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${APP_FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - stingrays

volumes:
  onboarding_uploads:
    name: stingrays_hrms_onboarding_uploads

networks:
  stingrays:
    name: stingrays_hrms_network
